<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>色つき夜背景の明度レベル見本</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif; background:#ECECEF; display:flex; justify-content:center; padding:26px 0 60px; }
  .stage { width: 430px; }
  h1 { font-size:16px; text-align:center; margin-bottom:4px; }
  .sub { text-align:center; font-size:11.5px; color:#666; margin-bottom:16px; line-height:1.6; }
  .lv { font-size:13px; font-weight:800; margin:22px 2px 2px; }
  .lv small { font-weight:400; color:#777; margin-left:6px; }
  .band-set { border-radius:14px; overflow:hidden; box-shadow:0 4px 16px rgba(0,0,0,.18); }
  .band { padding:11px 16px 9px; }
  .nm { font-weight:700; font-size:13px; }
  .tx { font-size:13.5px; line-height:1.65; margin-top:3px; }
  .hx { font-size:10px; opacity:.5; float:right; }
</style>
</head>
<body>
<div class="stage">
  <h1>色つき夜背景・明度レベル見本</h1>
  <div class="sub">同じ7色相（紅・橙・緑・シアン・青・紫・マゼンタ）を明度4段階で。<br>「投稿が色で区別できて、かつ夜っぽい」の境目を探す。</div>
  <div id="list"></div>
</div>
<script>
const HUES = ['紅', '橙', '緑', 'シアン', '青', '紫', 'マゼンタ'];
const NEON = { '紅':'#FF79C6','橙':'#FFB86C','緑':'#50FA7B','シアン':'#8BE9FD','青':'#8BE9FD','紫':'#BD93F9','マゼンタ':'#FF79C6' };
const LEVELS = [
  { key:'レベル1', note:'950番台＝前の「色つき夜」。ほぼ黒（参考・却下済み）',
    bgs:['#4C0519','#431407','#022C22','#083344','#172554','#2E1065','#4A044E'] },
  { key:'レベル2', note:'900番台。夜が濃いが色相は感じ取れる',
    bgs:['#881337','#7C2D12','#064E3B','#164E63','#1E3A8A','#4C1D95','#701A75'] },
  { key:'レベル3', note:'850相当（900と800の中間・カスタム）。夜×色の折衷',
    bgs:['#931038','#8B3012','#065640','#15566C','#1E3D9C','#531FA5','#7B1982'] },
  { key:'レベル4', note:'800番台＝ジュエル（参考・「いまいち」評価済み）',
    bgs:['#9F1239','#9A3412','#065F46','#155E75','#1E40AF','#5B21B6','#86198F'] },
];
const TEXT = '今日の気分をこの色に乗せて書く。読みやすさと夜っぽさの両立チェック。';
document.getElementById('list').innerHTML = LEVELS.map(lv => `
  <div class="lv">${lv.key} <small>${lv.note}</small></div>
  <div class="band-set">
    ${lv.bgs.map((bg, i) => `
      <div class="band" style="background:${bg};color:${NEON[HUES[i]]};">
        <span class="hx">${bg}</span>
        <div class="nm">${HUES[i]}の投稿</div>
        <div class="tx">${TEXT}</div>
      </div>`).join('')}
  </div>
`).join('');
</script>
</body>
</html>
